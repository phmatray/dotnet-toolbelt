name: CI
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - run: dotnet test --no-build -c Release --no-restore --logger "console;verbosity=detailed" || true
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
      - name: Show test results log
        if: always()
        run: cat CCrossThrowIfTests/bin/Release/net9.0/TestResults/*.log 2>/dev/null || echo "No log file found"
